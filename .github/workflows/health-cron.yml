name: Health check cron

# Pings the deployed site's /api/cron/health endpoint on a schedule. Use this when hosting
# somewhere that does not run vercel.json cron jobs (e.g. Railway, Fly, a VPS).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   HEALTH_URL   - Base URL of the deployed site, e.g. https://archivepool.up.railway.app
#   CRON_SECRET  - Same value as the CRON_SECRET env var on the deployed site.

on:
  schedule:
    # Every 15 minutes. GitHub cron is UTC and may run a few minutes late under load.
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger health sweep
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$HEALTH_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "HEALTH_URL and CRON_SECRET secrets must be set." >&2
            exit 1
          fi
          # Strip any trailing slash so we don't produce a double slash.
          base="${HEALTH_URL%/}"
          echo "Pinging $base/api/cron/health"
          code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$base/api/cron/health")
          echo "HTTP $code"
          cat /tmp/body.txt
          echo
          # Fail the job on non-2xx so a broken deploy shows up as a red run.
          case "$code" in
            2*) exit 0 ;;
            *) echo "Health sweep failed with HTTP $code" >&2; exit 1 ;;
          esac
